
# ───────── Static Core Binds ─────────
gesture = 3, horizontal, workspace
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ───────── Dynamic Settings Binds ─────────
bind = $mainMod, C, exec, hyprctl dispatch killactive
bind = $mainMod SHIFT_L, F, exec, hyprctl dispatch togglefloating
binde = $mainMod SHIFT_L, left, resizeactive, -50 0
binde = $mainMod SHIFT_L, right, resizeactive, 50 0
binde = $mainMod SHIFT_L, up, resizeactive, 0 -50
binde = $mainMod SHIFT_L, down, resizeactive, 0 50
bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, Q, exec, kitty
bind = $mainMod, F, exec, firefox
bind = $mainMod, E, exec, nautilus
bind = $mainMod, R, exec, bash ~/.config/hypr/scripts/reload.sh
bind = $mainMod SHIFT_L, C, exec, bash ~/.config/rofi/scripts/clipboard.sh
bind = $mainMod, SPACE, exec, bash ~/.config/rofi/scripts/launcher.sh
bind = $mainMod SHIFT_L, M, exec, hyprmod
bind = $mainMod, A, exec, eww open --toggle music-menu
bind = $mainMod, B, exec, bash ~/.config/eww/scripts/eww-toggle.sh power-menu
bind = $mainMod, W, exec, bash ~/.config/rofi/scripts/wallpaper.sh
bind = $mainMod, N, exec, bash ~/.config/eww/scripts/eww-toggle.sh wifi-menu
bind = $mainMod SHIFT_L, N, exec, swaync-client -t
bind = $mainMod, V, exec, bash ~/.config/eww/scripts/eww-toggle.sh vol-menu
bindl = , Caps_Lock, exec, sleep 0.1 && swayosd-client --caps-lock
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindl = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bindl = $mainMod SHIFT_L, S, exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = $mainMod SHIFT_L, P, exec, ~/.config/hypr/scripts/screenshot.sh --full
bindl = $mainMod SHIFT_L, Print, exec, ~/.config/hypr/scripts/screenshot.sh --full --edit
bindl = , XF86PowerOff, exec, hyprlock
bindel = $mainMod, L, exec, hyprlock
bindl = $mainMod SHIFT_L, SPACE, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , xf86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , xf86audiomute, exec, swayosd-client --output-volume mute-toggle
bindel = , xf86audiolowervolume, exec, swayosd-client --output-volume lower
bindel = , xf86audioraisevolume, exec, swayosd-client --output-volume raise
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, TAB, exec, ~/.config/hypr/scripts/focus_next_monitor.sh

# Close all eww menus
bind = $mainMod, Escape, exec, eww close wifi-password wifi-menu wifi-nets bt-menu bt-scan vol-menu power-menu music-menu 2>/dev/null
